<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookVerse Ultra Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#050816,#0b1220);
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
padding:60px 30px;
text-align:center;
background:radial-gradient(circle at top,#1f2937,#050816);
animation:fadeDown 0.8s ease;
}

.hero h1{
font-size:40px;
margin:0;
}

.hero p{
opacity:0.7;
}

/* SEARCH */
.searchBox{
margin-top:20px;
display:flex;
justify-content:center;
}

.searchBox input{
width:60%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
}

/* CATEGORY */
.categories{
display:flex;
gap:10px;
justify-content:center;
margin:20px 0;
flex-wrap:wrap;
}

.cat{
padding:8px 14px;
border-radius:20px;
background:rgba(255,255,255,0.06);
cursor:pointer;
transition:0.3s;
}

.cat:hover{
background:#22c55e;
color:black;
transform:scale(1.05);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:12px;
transition:0.4s;
animation:fadeUp 0.6s ease;
border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
transform:translateY(-8px) scale(1.02);
border-color:#22c55e;
}

img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
background:#22c55e;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#16a34a;
}

/* ANIMATIONS */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}

/* FADE OUT FILTER */
.hide{
display:none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>📚 BookVerse Premium Store</h1>
<p>Search. Explore. Discover best books instantly.</p>

<div class="searchBox">
<input id="search" onkeyup="filter()" placeholder="Search books...">
</div>
</div>

<!-- CATEGORIES -->
<div class="categories">
<div class="cat" onclick="setCat('all')">All</div>
<div class="cat" onclick="setCat('self')">Self Help</div>
<div class="cat" onclick="setCat('business')">Business</div>
<div class="cat" onclick="setCat('fiction')">Fiction</div>
</div>

<!-- PRODUCTS -->
<div class="grid" id="grid">

<div class="card" data-cat="self" data-name="Atomic Habits">
<img src="https://covers.openlibrary.org/b/id/9259256-L.jpg">
<h3>Atomic Habits</h3>
<p>₹499</p>
<button>Add to Cart</button>
</div>

<div class="card" data-cat="business" data-name="Rich Dad Poor Dad">
<img src="https://covers.openlibrary.org/b/id/8231856-L.jpg">
<h3>Rich Dad Poor Dad</h3>
<p>₹399</p>
<button>Add to Cart</button>
</div>

<div class="card" data-cat="fiction" data-name="The Alchemist">
<img src="https://covers.openlibrary.org/b/id/11153261-L.jpg">
<h3>The Alchemist</h3>
<p>₹299</p>
<button>Add to Cart</button>
</div>

<div class="card" data-cat="fiction" data-name="Harry Potter">
<img src="https://covers.openlibrary.org/b/id/7984916-L.jpg">
<h3>Harry Potter</h3>
<p>₹599</p>
<button>Add to Cart</button>
</div>

</div>

<script>

let currentCat="all";

/* SEARCH */
function filter(){
let val=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
let name=c.getAttribute("data-name").toLowerCase();

if(name.includes(val)){
c.style.display="block";
c.style.animation="fadeUp 0.4s ease";
}else{
c.style.display="none";
}
});
}

/* CATEGORY FILTER */
function setCat(cat){
currentCat=cat;
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
let ccat=c.getAttribute("data-cat");

if(cat==="all" || ccat===cat){
c.style.display="block";
}else{
c.style.display="none";
}
});
}

/* SMALL LIVE EFFECT */
setInterval(()=>{
let cards=document.querySelectorAll(".card");
cards.forEach(c=>{
c.style.boxShadow="0 0 10px rgba(34,197,94,0.1)";
});
},2000);

</script>

</body>
</html>

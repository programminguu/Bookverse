<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookVerse Ultra SaaS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(120deg,#020617,#0f172a);
}

.box{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:14px;
width:280px;
backdrop-filter:blur(10px);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:20px;
background:#22c55e;
cursor:pointer;
font-weight:bold;
}

/* APP */
#app{
display:none;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
position:fixed;
background:rgba(255,255,255,0.04);
padding:15px;
}

.nav{
padding:10px;
margin:6px 0;
background:rgba(255,255,255,0.05);
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.nav:hover{
background:#22c55e;
color:black;
}

.main{
margin-left:220px;
padding:15px;
}

/* CARDS */
.card{
background:rgba(255,255,255,0.05);
padding:12px;
margin:10px 0;
border-radius:12px;
animation:fade 0.4s ease;
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* PRODUCTS */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.product img{
width:100%;
height:130px;
border-radius:10px;
object-fit:cover;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:10px;
border-radius:8px;
display:none;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>📚 BookVerse Login</h2>
<div class="box">
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="enter()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
<h3>📚 BookVerse AI</h3>
<div class="nav" onclick="show('dash')">Dashboard</div>
<div class="nav" onclick="show('store')">Store</div>
<div class="nav" onclick="show('cart')">Cart</div>
<div class="nav" onclick="show('orders')">Orders</div>
<div class="nav" onclick="show('analytics')">Analytics</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dash">
<h2>📊 Dashboard</h2>
<div class="card">Revenue: ₹<span id="rev">12000</span></div>
<div class="card">Orders: <span id="ord">50</span></div>
<div class="card">Users: <span id="usr">30</span></div>
</div>

<!-- STORE -->
<div id="store" style="display:none;">
<h2>🛍 Store</h2>

<div class="grid">

<div class="card product">
<img src="https://covers.openlibrary.org/b/id/9259256-L.jpg">
<b>Atomic Habits</b>
<p>₹499</p>
<button onclick="add('Atomic Habits')">Add to Cart</button>
</div>

<div class="card product">
<img src="https://covers.openlibrary.org/b/id/8231856-L.jpg">
<b>Rich Dad Poor Dad</b>
<p>₹399</p>
<button onclick="add('Rich Dad Poor Dad')">Add to Cart</button>
</div>

<div class="card product">
<img src="https://covers.openlibrary.org/b/id/11153261-L.jpg">
<b>The Alchemist</b>
<p>₹299</p>
<button onclick="add('The Alchemist')">Add to Cart</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cart" style="display:none;">
<h2>🛒 Cart</h2>
<div id="cartBox"></div>
</div>

<!-- ORDERS -->
<div id="orders" style="display:none;">
<h2>📦 Live Orders</h2>
<div id="feed"></div>
</div>

<!-- ANALYTICS -->
<div id="analytics" style="display:none;">
<h2>📈 Analytics</h2>
<div class="card">Growth Simulation Running...</div>
</div>

</div>

</div>

<div class="toast" id="toast">Done</div>

<script>

let cart=[];

/* LOGIN */
function enter(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
start();
}

/* NAV */
function show(id){
["dash","store","cart","orders","analytics"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";

if(id==="cart") renderCart();
}

/* CART */
function add(item){
cart.push(item);
toast();
}

/* RENDER CART */
function renderCart(){
let box=document.getElementById("cartBox");
box.innerHTML="";
cart.forEach(c=>{
box.innerHTML+=`<div class="card">${c}</div>`;
});
}

/* TOAST */
function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1000);
}

/* FAKE LIVE SYSTEM */
function start(){

setInterval(()=>{

document.getElementById("rev").innerText =
parseInt(document.getElementById("rev").innerText)+Math.floor(Math.random()*100);

document.getElementById("ord").innerText =
parseInt(document.getElementById("ord").innerText)+1;

document.getElementById("usr").innerText =
parseInt(document.getElementById("usr").innerText)+(Math.random()>0.7?1:0);

/* fake orders feed */
let names=["Rahul","Aman","Neha","Vikas","John"];
let books=["Atomic Habits","Rich Dad Poor Dad","Alchemist"];

document.getElementById("feed").innerHTML =
`<div class="card">${names[Math.floor(Math.random()*5)]} bought ${books[Math.floor(Math.random()*3)]}</div>`
+ document.getElementById("feed").innerHTML;

},2000);

}

</script>

</body>
</html>

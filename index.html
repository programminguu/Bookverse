<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookVerse Full Stack</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input{
padding:10px;
margin:5px;
width:220px;
border-radius:8px;
border:none;
}

button{
padding:10px;
width:220px;
margin-top:5px;
border:none;
border-radius:20px;
background:#22c55e;
cursor:pointer;
font-weight:bold;
}

.app{
display:none;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
padding:10px;
margin:10px 0;
border-radius:10px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.smallbtn{
width:auto;
padding:6px 10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="center" id="auth">
<h2>📚 BookVerse Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="app" id="app">

<h2>📚 BookVerse Store</h2>
<button onclick="logout()">Logout</button>

<h3>Products</h3>
<div id="products"></div>

<h3>Cart</h3>
<div id="cart"></div>

<h3>Orders</h3>
<div id="orders"></div>

</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* AUTH */
function signup(){
auth.createUserWithEmailAndPassword(email.value, pass.value);
}

function login(){
auth.signInWithEmailAndPassword(email.value, pass.value);
}

function logout(){
auth.signOut();
}

/* STATE */
auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";
loadProducts();
loadCart();
loadOrders();
}else{
document.getElementById("auth").style.display="flex";
document.getElementById("app").style.display="none";
}
});

/* PRODUCTS (STATIC) */
let products=[
"Atomic Habits",
"Rich Dad Poor Dad",
"The Alchemist",
"Deep Work"
];

function loadProducts(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<b>${p}</b><br>
<button class="smallbtn" onclick="addCart('${p}')">Add to Cart</button>
</div>
`;
});
}

/* CART */
function addCart(book){
let user=auth.currentUser;

db.collection("cart").add({
user:user.email,
book:book
});

loadCart();
}

/* LOAD CART */
function loadCart(){
let box=document.getElementById("cart");
box.innerHTML="";

db.collection("cart")
.where("user","==",auth.currentUser.email)
.get()
.then(snap=>{
snap.forEach(doc=>{
box.innerHTML+=`
<div class="card">
${doc.data().book}
</div>
`;
});
});
}

/* PLACE ORDER */
function placeOrder(book){
let user=auth.currentUser;

db.collection("orders").add({
user:user.email,
book:book,
status:"Processing"
});

loadOrders();
}

/* ORDERS */
function loadOrders(){
let box=document.getElementById("orders");
box.innerHTML="";

db.collection("orders")
.where("user","==",auth.currentUser.email)
.get()
.then(snap=>{
snap.forEach(doc=>{
box.innerHTML+=`
<div class="card">
${doc.data().book} - ${doc.data().status}
</div>
`;
});
});
}

</script>

</body>
</html>
